import_history:
  name: Re-import History
  description: "Re-import all historical data from the previously stored export file into Home Assistant statistics."

import_file:
  name: Import File
  description: "Upload a new zepp_health_export.json and import all historical data into Home Assistant."
  fields:
    file:
      name: Export File
      description: "The zepp_health_export.json file generated by the extraction script."
      required: true
      selector:
        file:
          accept: ".json"
