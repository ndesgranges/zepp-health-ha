name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint extraction script
        run: pylint scripts/extract_zepp_health.py

      - name: Lint integration (syntax & style)
        run: pylint custom_components/zepp_health/ --disable=import-error --ignore=strings.json
